---
name: Fuzz

"on":
  schedule:
    # Run weekly, early Monday morning UTC.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Seconds to run each fuzz target"
        required: false
        default: "300"

env:
  CARGO_TERM_COLOR: always
  # Seconds per fuzz target; overridable via workflow_dispatch input.
  FUZZ_SECONDS: ${{ github.event.inputs.fuzz_seconds || '300' }}

jobs:
  fuzz:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        crate:
          - deb822-lossless
          - deb822-fast
          - debian-control
          - debian-copyright
          - debian-changelog
          - debian-watch
          - apt-sources
          - dep3
          - lintian-overrides

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt install clang llvm pkg-config nettle-dev

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Restore corpus
        uses: actions/cache/restore@v4
        with:
          path: ${{ matrix.crate }}/fuzz/corpus
          key: fuzz-corpus-${{ matrix.crate }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.crate }}-

      - name: Run fuzz targets
        run: |
          set -e
          cd ${{ matrix.crate }}
          for target in $(cargo fuzz list); do
            echo "::group::Fuzzing $target"
            cargo fuzz run "$target" -- \
              -max_total_time="$FUZZ_SECONDS" \
              -print_final_stats=1
            echo "::endgroup::"
          done

      - name: Save corpus
        # Persist the corpus even if a target found a crash, so the
        # next run starts from the inputs discovered so far.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ matrix.crate }}/fuzz/corpus
          key: fuzz-corpus-${{ matrix.crate }}-${{ github.run_id }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.crate }}
          path: ${{ matrix.crate }}/fuzz/artifacts
          if-no-files-found: ignore
